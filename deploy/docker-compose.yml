services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-19000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ios_headers}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - ${STACK_DATA_DIR:-./data}/clickhouse:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${STACK_DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_minio
    ports:
      - "${MINIO_API_PORT:-19001}:9000"
      - "${MINIO_CONSOLE_PORT:-19002}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - ${STACK_DATA_DIR:-./data}/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-ios-headers}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb -p local/$${MINIO_BUCKET} || true;
      mc anonymous set download local/$${MINIO_BUCKET};
      echo 'MinIO bucket initialized.';
      "
    restart: 'no'

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-ios_headers}_net
