services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_web
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_NATIVE_PORT: 9000
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ios_headers}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-ios-headers}
      MINIO_SECURE: "false"
      VIEW_CACHE_TTL_SECONDS: ${VIEW_CACHE_TTL_SECONDS:-2592000}
      SEARCH_CACHE_TTL_SECONDS: ${SEARCH_CACHE_TTL_SECONDS:-300}
      ENABLE_REDIS_PAGE_CACHE: ${ENABLE_REDIS_PAGE_CACHE:-false}
      ENABLE_SYMBOL_MATRIX: ${ENABLE_SYMBOL_MATRIX:-false}
      SHOW_QUERY_ELAPSED_MS: ${SHOW_QUERY_ELAPSED_MS:-false}
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_nginx
    ports:
      - "${WEB_PORT:-18080}:80"
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./webroot:/webroot:ro
    depends_on:
      web:
        condition: service_healthy

  frpc:
    image: ghcr.io/fatedier/frpc:v0.61.2
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_frpc
    profiles: ["tunnel"]
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    environment:
      FRP_SERVER_ADDR: ${FRP_SERVER_ADDR:-}
      FRP_SERVER_PORT: ${FRP_SERVER_PORT:-7000}
      FRP_TOKEN: ${FRP_TOKEN:-}
      FRP_PROXY_NAME: ${FRP_PROXY_NAME:-ios-headers-web}
      FRP_REMOTE_PORT: ${FRP_REMOTE_PORT:-18080}
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        [ -n "$$FRP_SERVER_ADDR" ] || { echo "FRP_SERVER_ADDR is required"; exit 1; }
        [ -n "$$FRP_TOKEN" ] || { echo "FRP_TOKEN is required"; exit 1; }
        cat >/tmp/frpc.toml <<EOF
        serverAddr = "$$FRP_SERVER_ADDR"
        serverPort = $${FRP_SERVER_PORT}
        auth.method = "token"
        auth.token = "$$FRP_TOKEN"

        [[proxies]]
        name = "$$FRP_PROXY_NAME"
        type = "tcp"
        localIP = "nginx"
        localPort = 80
        remotePort = $${FRP_REMOTE_PORT}
        EOF
        exec frpc -c /tmp/frpc.toml

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-19000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-ios_headers}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - ${STACK_DATA_DIR:-./data}/clickhouse:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - ./clickhouse/config.d/named_collections.xml:/etc/clickhouse-server/config.d/named_collections.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${STACK_DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-ios_headers}_minio
    ports:
      - "${MINIO_API_PORT:-19001}:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER: "off"
    command: server /data
    volumes:
      - ${STACK_DATA_DIR:-./data}/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-ios_headers}_net
