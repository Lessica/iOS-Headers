<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}iOS Headers{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      color: #1f2937;
      background: #f8fafc;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2 {
      margin: 0 0 12px;
      font-weight: 600;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    a {
      color: #1d4ed8;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .muted {
      color: #6b7280;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #ffffff;
    }
    th, td {
      border: 1px solid #e5e7eb;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f3f4f6;
      font-weight: 600;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
    }
    .code-block {
      white-space: pre;
      overflow: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #ffffff;
      padding: 12px;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
    }
    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
    }
    .ok {
      color: #166534;
      font-weight: 600;
    }
    .no {
      color: #991b1b;
      font-weight: 600;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-input {
      width: min(680px, 100%);
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
      background: #ffffff;
    }
    .btn {
      padding: 9px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #ffffff;
      color: #0f172a;
      font-size: 14px;
      cursor: pointer;
    }
    .list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .list li {
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .list li:last-child {
      border-bottom: 0;
    }
  </style>
</head>
<body>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
